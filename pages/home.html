<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home — MoodTracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/tailwind.config.js"></script>
</head>
<body class="bg-page-bg font-sans overflow-x-hidden">

  <div id="navbar"></div>

  <div class="min-h-[calc(100vh-64px)] flex flex-col lg:flex-row">

    <!-- Left -->
    <div class="flex-1 px-6 py-8 lg:px-14 lg:py-12 flex flex-col gap-5 border-b lg:border-b-0 lg:border-r border-gray-200">
      <p class="text-xs text-gray-400" id="log-date"></p>
      <h2 class="text-2xl font-bold text-primary" id="log-title">How are you feeling today, Name?</h2>

      <div class="flex justify-between sm:justify-start gap-1 sm:gap-3 w-full" id="log-moods"></div>

      <label class="text-xs font-semibold text-gray-600">Add a note (optional)</label>
      <textarea id="note-input" placeholder="What's on your mind?"
        class="w-full h-24 px-4 py-3 rounded-xl border border-gray-200 text-sm text-gray-700 resize-none focus:outline-none focus:border-green-400 font-[Poppins]"></textarea>

      <label class="text-xs font-semibold text-gray-600">Tags</label>
      <div id="home-tag-container" class="flex gap-2 flex-wrap"></div>

      <button onclick="saveMood()"
        class="mt-auto w-full py-3.5 rounded-full bg-pink-bg text-primary font-bold hover:bg-pink-300 transition-all hover:-translate-y-0.5">
        Save Today's Mood
      </button>
    </div>

    <!-- Right -->
    <div class="w-full lg:w-80 px-6 py-8 lg:px-10 lg:py-12 flex flex-col gap-8 flex-shrink-0">

      <!-- This Week -->
      <div>
        <p class="text-sm font-bold text-primary mb-4">This Week</p>
        <div class="grid grid-cols-7 gap-1.5 text-center" id="week-grid"></div>
      </div>

      <!-- This Month -->
      <div>
        <p class="text-sm font-bold text-primary mb-4">This Month</p>
        <div class="grid grid-cols-2 gap-3">
          <div class="bg-pink-bg rounded-xl p-4">
            <div class="text-2xl font-bold text-gray-700" id="stat-entries">0</div>
            <div class="text-[11px] text-gray-400 mt-1 font-medium">Entries Logged</div>
          </div>
          <div class="bg-pink-bg rounded-xl p-4">
            <div class="w-7 h-7" id="stat-frequent-icon"></div>
            <div class="text-[11px] text-gray-400 mt-1 font-medium">Most Frequent</div>
          </div>
          <div class="bg-pink-bg rounded-xl p-4">
            <div class="text-2xl font-bold text-primary" id="stat-streak">0</div>
            <div class="text-[11px] text-gray-400 mt-1 font-medium">Day Streak</div>
          </div>
          <div class="bg-pink-bg rounded-xl p-4">
            <div class="text-2xl font-bold text-gray-700" id="stat-positive">0%</div>
            <div class="text-[11px] text-gray-400 mt-1 font-medium">Positive Days</div>
          </div>
        </div>
      </div>

      <!-- Quote -->
      <p class="italic text-gray-400 text-xs leading-relaxed border-l-2 border-pink-bg pl-3">
        "If you spend too much time thinking about a thing, you'll never get it done."<br/>— Bruce Lee
      </p>

    </div>
  </div>

  <!-- Toast -->
  <div id="toast"
    class="fixed bottom-8 left-1/2 -translate-x-1/2 translate-y-16 opacity-0 pointer-events-none
           bg-primary text-white px-8 py-3 rounded-full text-sm font-semibold shadow-lg
           transition-all duration-300 z-50">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/tags.js"></script>
  <script src="../js/home.js"></script>
</body>
</html>
