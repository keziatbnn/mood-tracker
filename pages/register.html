<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — MoodTracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/tailwind.config.js"></script>

  <style>
  input[type="password"]::-ms-reveal,
  input[type="password"]::-ms-clear {
    display: none;
  }
  
  input[type="password"]::-webkit-contacts-auto-fill-button,
  input[type="password"]::-webkit-credentials-auto-fill-button {
    visibility: hidden;
    display: none !important;
    pointer-events: none;
  }
</style>

</head>
<body class="bg-page-bg font-sans">

  <div id="navbar"></div>

  <div class="min-h-[calc(100vh-64px)] flex items-center justify-center px-6 py-12">
    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col md:flex-row">

      <!-- Left Section -->
      <div class="bg-pink-bg flex flex-col justify-between p-10 md:w-2/5">
        <div class="flex flex-col gap-6">
          <div class="w-14 h-14 bg-white rounded-xl shadow flex items-center justify-center">
            <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"/>
              <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
              <line x1="9" y1="9" x2="9.01" y2="9" stroke-linecap="round" stroke-width="2.5"/>
              <line x1="15" y1="9" x2="15.01" y2="9" stroke-linecap="round" stroke-width="2.5"/>
            </svg>
          </div>

          <!-- Title & Description -->
          <div>
            <p class="text-xl font-bold text-primary font-[Poppins]">MoodTracker</p>
            <p class="text-sm text-gray-500 mt-3 leading-relaxed">
              Track your emotions, monitor your mood patterns, and improve your mental well-being through daily reflections.
            </p>
          </div>
        </div>

        <!-- Footer -->
        <p class="text-xs text-gray-400 tracking-widest mt-10">AUTHORIZED ACCESS ONLY</p>
      </div>

      <!-- Right Section (Form) -->
      <div class="flex flex-col justify-center p-10 md:w-3/5">
        <h1 class="text-2xl font-bold text-primary font-[Poppins]">Create Account</h1>
        <p class="text-sm text-gray-400 mt-1 mb-6">
          Create your MoodTracker account and start monitoring your emotional journey.
        </p>

        <div id="registerMessage" class="hidden text-sm rounded-xl px-4 py-3 mb-4"></div>

        <form id="registerForm" class="flex flex-col gap-4">

          <!-- Full Name -->
          <div>
            <label class="text-xs font-semibold text-gray-500 mb-1.5 block uppercase tracking-wide">Full Name</label>
            <input type="text" id="fullNameInput" placeholder="Your full name" autocomplete="name"
              class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm text-gray-800 focus:outline-none focus:border-primary font-[Poppins]" />
          </div>

          <!-- Email -->
          <div>
            <label class="text-xs font-semibold text-gray-500 mb-1.5 block uppercase tracking-wide">Email</label>
            <input type="email" id="emailInput" placeholder="you@email.com" autocomplete="email"
              class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm text-gray-800 focus:outline-none focus:border-primary font-[Poppins]" />
          </div>

          <!-- Password -->
          <div>
            <label class="text-xs font-semibold text-gray-500 mb-1.5 block uppercase tracking-wide">Password</label>
            <div class="relative">
              <input type="password" id="passwordInput" placeholder="At least 6 characters" autocomplete="new-password"
                class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm text-gray-800 focus:outline-none focus:border-primary font-[Poppins] pr-12" />
              <button type="button" id="togglePassword"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors"
                aria-label="Toggle password visibility">
                <svg id="eyeIconPassword" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Confirm Password -->
          <div>
            <label class="text-xs font-semibold text-gray-500 mb-1.5 block uppercase tracking-wide">Confirm Password</label>
            <div class="relative">
              <input type="password" id="confirmPasswordInput" placeholder="Re-enter your password" autocomplete="new-password"
                class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm text-gray-800 focus:outline-none focus:border-primary font-[Poppins] pr-12" />
              <button type="button" id="toggleConfirmPassword"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors"
                aria-label="Toggle confirm password visibility">
                <svg id="eyeIconConfirm" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Submit Button -->
          <button type="submit"
            class="w-full py-3 rounded-xl bg-pink-bg text-primary text-sm font-bold uppercase tracking-wide hover:brightness-95 transition-all mt-1">
            CREATE ACCOUNT
          </button>

        </form>

        <!-- Login Link -->
        <p class="text-sm text-gray-400 text-center mt-5">
          Already have an account?
          <a href="login.html" class="text-primary font-semibold hover:underline ml-1">Log In</a>
        </p>
      </div>

    </div>
  </div>

  <script src="../js/navbar_auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/register.js"></script>
</body>
</html>
