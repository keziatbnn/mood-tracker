<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Statistic — MoodTracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/tailwind.config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body class="bg-page-bg font-sans">

  <div id="navbar"></div>

  <div class="px-14 py-10">
    <h1 class="text-3xl font-bold text-primary mb-6">Statistic</h1>

    <!-- Summary cards -->
    <div class="grid grid-cols-4 gap-4 mb-6">
      <div class="bg-pink-bg rounded-2xl p-6">
        <div class="text-3xl font-bold text-gray-700 mb-1" id="stat-total">0</div>
        <div class="text-sm text-gray-400 font-medium">Entries Logged</div>
      </div>
      <div class="bg-pink-bg rounded-2xl p-6">
        <div id="stat-frequent" class="mb-1 h-10 flex items-center"></div>
        <div class="text-sm text-gray-400 font-medium">Most Frequent</div>
      </div>
      <div class="bg-pink-bg rounded-2xl p-6">
        <div class="text-3xl font-bold text-gray-700 mb-1" id="stat-streak">0</div>
        <div class="text-sm text-gray-400 font-medium">Day Streak</div>
      </div>
      <div class="bg-pink-bg rounded-2xl p-6">
        <div class="text-3xl font-bold text-gray-700 mb-1" id="stat-positive">0%</div>
        <div class="text-sm text-gray-400 font-medium">Positive Days</div>
      </div>
    </div>

    <!-- Charts row -->
    <div class="flex gap-6 items-start">

      <!-- Mood Trend -->
      <div class="flex-[3] bg-pink-bg rounded-2xl p-8">
        <div class="flex items-start justify-between mb-6">
          <div>
            <h2 class="text-lg font-bold text-primary">Mood Trend</h2>
            <p class="text-xs text-gray-400 mt-0.5">Daily mood through the month</p>
          </div>
          <div class="flex bg-white rounded-xl p-1 gap-1">
            <button class="trend-btn px-4 py-1.5 rounded-lg text-sm font-semibold text-gray-500 transition-all" data-view="week">Week</button>
            <button class="trend-btn px-4 py-1.5 rounded-lg text-sm font-semibold bg-primary text-white transition-all" data-view="month">Month</button>
            <button class="trend-btn px-4 py-1.5 rounded-lg text-sm font-semibold text-gray-500 transition-all" data-view="year">Year</button>
          </div>
        </div>
        <div class="h-56">
          <canvas id="trend-chart"></canvas>
        </div>
      </div>

      <!-- Mood Mix -->
      <div class="flex-[2] bg-pink-bg rounded-2xl p-8">
        <h2 class="text-lg font-bold text-primary mb-6">Mood Mix</h2>
        <div class="h-44">
          <canvas id="mix-chart"></canvas>
        </div>
        <div class="flex gap-10 mt-6">
          <div id="legend-left" class="flex flex-col gap-2.5"></div>
          <div id="legend-right" class="flex flex-col gap-2.5"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="../js/navbar.js"></script>
  <script src="../js/statistics.js"></script>
</body>
</html>
