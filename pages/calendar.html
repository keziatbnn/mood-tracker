<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calendar — MoodTracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/tailwind.config.js"></script>
</head>
<body class="bg-page-bg font-sans overflow-x-hidden">

  <div id="navbar"></div>

  <div class="px-6 py-8 lg:px-14 lg:py-10">
    <h1 class="text-2xl sm:text-3xl font-bold text-primary mb-6">Calendar</h1>

    <div class="flex flex-col lg:flex-row gap-6 items-start w-full">

      <div class="flex-1 w-full bg-pink-bg rounded-2xl p-5 sm:p-8">

        <div class="flex items-center gap-3 mb-6">
          <button id="prev-month"
            class="w-8 h-8 bg-white rounded-lg flex items-center justify-center shadow-sm hover:bg-gray-50 transition">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M10 12L6 8l4-4" stroke="#1F915A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button id="next-month"
            class="w-8 h-8 bg-white rounded-lg flex items-center justify-center shadow-sm hover:bg-gray-50 transition">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M6 4l4 4-4 4" stroke="#1F915A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span id="month-label" class="text-lg sm:text-xl font-bold text-primary ml-1"></span>
        </div>

        <div class="grid grid-cols-7 gap-1 sm:gap-2 mb-2 text-center">
          <div class="text-[10px] sm:text-xs font-semibold text-primary py-1">Mon</div>
          <div class="text-[10px] sm:text-xs font-semibold text-primary py-1">Tue</div>
          <div class="text-[10px] sm:text-xs font-semibold text-primary py-1">Wed</div>
          <div class="text-[10px] sm:text-xs font-semibold text-primary py-1">Thu</div>
          <div class="text-[10px] sm:text-xs font-semibold text-primary py-1">Fri</div>
          <div class="text-[10px] sm:text-xs font-semibold text-primary py-1">Sat</div>
          <div class="text-[10px] sm:text-xs font-semibold text-primary py-1">Sun</div>
        </div>

        <div id="cal-grid" class="grid grid-cols-7 gap-1 sm:gap-2"></div>

      </div>

      <div class="w-full lg:w-80 bg-pink-bg rounded-2xl p-6 sm:p-8 flex-shrink-0 flex flex-col gap-4">
        <h2 class="text-xl font-bold text-primary">Day Detail</h2>
        <p id="detail-date" class="text-sm text-gray-400 -mt-2"></p>
        <div id="detail-mood"></div>
        <p id="detail-note"
          class="text-sm text-gray-600 bg-white rounded-xl px-4 py-3 leading-relaxed hidden"></p>
        <div id="detail-tags" class="flex flex-wrap gap-2"></div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/calendar.js"></script>
</body>
</html>
