<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Account — MoodTracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/tailwind.config.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
  <style>
    .cropper-container { max-height: 400px; }
    #cropImageEl { display: block; max-width: 100%; }
  </style>
</head>
<body class="bg-page-bg font-sans overflow-x-hidden">

  <div id="navbar"></div>

  <!-- crop modal -->
  <div
    id="cropModal"
    class="hidden fixed inset-0 z-[999] flex items-center justify-center p-4"
    role="dialog"
    aria-modal="true"
    aria-labelledby="cropModalTitle"
  >
    <!-- Overlay -->
    <div
      id="cropModalOverlay"
      class="absolute inset-0 bg-black/70 backdrop-blur-sm"
      onclick="closeCropModal()"
    ></div>

    <!-- Panel -->
    <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg flex flex-col overflow-hidden z-10">
      
      <!-- Header -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
        <div>
          <h2 id="cropModalTitle" class="text-base font-bold text-gray-800">Crop Profile Photo</h2>
          <p class="text-xs text-gray-400 mt-0.5">Drag to reposition</p>
        </div>
        <button
          onclick="closeCropModal()"
          class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors"
          aria-label="Close"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Crop area -->
      <div class="bg-gray-900 overflow-hidden" style="height:340px;">
        <img id="cropImageEl" src="" alt="Crop preview" style="display:block;max-width:100%;"/>
      </div>

      <!-- Preview + controls -->
      <div class="px-6 py-4 flex items-center gap-4 border-t border-gray-100 bg-gray-50">
        <!-- Live circular preview -->
        <div class="flex flex-col items-center gap-1 flex-shrink-0">
          <div
            id="cropPreviewCircle"
            class="w-16 h-16 rounded-full overflow-hidden border-2 border-primary/30 bg-gray-200"
          ></div>
          <span class="text-[10px] text-gray-400 font-medium">Preview</span>
        </div>

        <div class="flex-1 flex flex-col gap-2">
        </div>
      </div>

      <!-- Action buttons -->
      <div class="px-6 py-4 flex flex-col sm:flex-row-reverse gap-2 border-t border-gray-100">
        <button
          id="saveCropBtn"
          onclick="saveCrop()"
          class="flex-1 sm:flex-none px-6 py-2.5 rounded-xl bg-primary text-white text-sm font-bold hover:opacity-90 transition-all flex items-center justify-center gap-2"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
          Save Photo
        </button>
        <button
          onclick="resetCrop()"
          class="flex-1 sm:flex-none px-5 py-2.5 rounded-xl border border-gray-300 text-sm font-bold text-gray-700 hover:bg-gray-50 transition-all"
        >
          Reset
        </button>
        <button
          onclick="closeCropModal()"
          class="flex-1 sm:flex-none px-5 py-2.5 rounded-xl border border-gray-300 text-sm font-bold text-gray-500 hover:bg-gray-50 transition-all"
        >
          Cancel
        </button>
      </div>
    </div>
  </div>

  <!-- main content -->
  <div class="min-h-[calc(100vh-64px)] flex justify-center px-4 sm:px-6 py-8 sm:py-12">
    <div class="w-full max-w-3xl flex flex-col gap-6">

      <div>
        <h1 class="text-2xl sm:text-3xl font-bold text-primary">My Account</h1>
        <p class="text-sm text-gray-400 mt-1">Manage your profile and account information</p>
      </div>

      <!-- Profile Header Card -->
      <div class="bg-white border border-gray-100 rounded-2xl p-6 sm:p-8 flex flex-col sm:flex-row items-center text-center sm:text-left gap-4 sm:gap-6">
        
        <!-- Avatar wrapper -->
        <div class="relative flex-shrink-0">
          <!-- Inisial avatar -->
          <div
            id="accountAvatar"
            class="w-24 h-24 sm:w-28 sm:h-28 rounded-full bg-gray-200 flex items-center justify-center text-white text-3xl font-bold"
          ></div>
          <!-- Photo avatar -->
          <img
            id="accountAvatarImg"
            src=""
            alt="Profile Photo"
            class="hidden w-24 h-24 sm:w-28 sm:h-28 rounded-full object-cover"
          />
          <!-- Upload loading overlay -->
          <div
            id="avatarLoadingOverlay"
            class="hidden absolute inset-0 rounded-full bg-black/50 items-center justify-center"
          >
            <svg class="animate-spin w-8 h-8 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
          </div>
        </div>

        <!-- Info & action buttons -->
        <div class="flex flex-col items-center sm:items-start gap-2 flex-1 min-w-0">
          <p class="text-xl sm:text-2xl font-bold text-gray-900 truncate w-full" id="accountName">Name LastName</p>
          <p class="text-sm sm:text-base text-gray-500" id="accountEmail">name@gmail.com</p>
          <p class="text-xs sm:text-sm text-gray-400" id="accountSince">Member since —</p>

          <div class="flex flex-wrap gap-2 mt-1">
            <button
              id="changePhotoBtn"
              onclick="triggerPhotoPicker()"
              class="px-4 py-2 rounded-xl border border-gray-300 text-xs font-bold text-gray-700 hover:bg-gray-50 transition-all flex items-center gap-1.5"
            >
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
              Change Photo
            </button>
            <button
              id="removePhotoBtn"
              onclick="confirmRemovePhoto()"
              class="hidden px-4 py-2 rounded-xl border border-red-200 text-xs font-bold text-red-500 hover:bg-red-50 transition-all flex items-center gap-1.5"
            >
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
              Remove Photo
            </button>
          </div>

          <div id="photoMessage" class="hidden text-sm rounded-xl px-4 py-2 w-full max-w-sm mt-1"></div>
        </div>
      </div>

      <!-- Hidden file input -->
      <input
        type="file"
        id="photoFileInput"
        accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp"
        class="hidden"
      />

      <!-- Edit Profile -->
      <div class="bg-white border border-gray-100 rounded-2xl p-6 sm:p-8">
        <p class="text-xs sm:text-sm font-bold text-primary tracking-wide mb-5">EDIT PROFILE</p>
        <div id="profileMessage" class="hidden text-sm rounded-xl px-4 py-3 mb-4"></div>
        <form id="profileForm" class="flex flex-col gap-5">
          <div>
            <label class="text-sm font-semibold text-gray-600 mb-2 block">Full Name</label>
            <input type="text" id="fullNameInput" required
              class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm text-gray-800 focus:outline-none focus:border-primary font-[Poppins]" />
          </div>
          <div>
            <label class="text-sm font-semibold text-gray-600 mb-2 block">Email</label>
            <input type="email" id="emailInput" disabled
              class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-100 text-sm text-gray-400 font-[Poppins]" />
          </div>
          <div class="flex flex-col sm:flex-row gap-3">
            <button type="submit"
              class="w-full sm:w-auto px-6 py-2.5 rounded-xl border border-gray-300 text-sm font-bold text-gray-800 hover:bg-gray-50 transition-all">
              Save Changes
            </button>
            <button type="button" onclick="resetProfileForm()"
              class="w-full sm:w-auto px-6 py-2.5 rounded-xl border border-gray-300 text-sm font-bold text-gray-800 hover:bg-gray-50 transition-all">
              Cancel
            </button>
          </div>
        </form>
      </div>

      <!-- Change Password -->
      <div class="bg-white border border-gray-100 rounded-2xl p-6 sm:p-8">
        <p class="text-xs sm:text-sm font-bold text-primary tracking-wide mb-5">CHANGE PASSWORD</p>
        <div id="passwordMessage" class="hidden text-sm rounded-xl px-4 py-3 mb-4"></div>
        <form id="passwordForm" class="flex flex-col gap-5">
          <div>
            <label class="text-sm font-semibold text-gray-600 mb-2 block">New Password</label>
            <input type="password" id="newPassword" placeholder="At least 6 characters" minlength="6"
              class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm text-gray-800 focus:outline-none focus:border-primary font-[Poppins]" />
          </div>
          <div>
            <label class="text-sm font-semibold text-gray-600 mb-2 block">Confirm New Password</label>
            <input type="password" id="confirmNewPassword" placeholder="Re-enter your new password" minlength="6"
              class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm text-gray-800 focus:outline-none focus:border-primary font-[Poppins]" />
          </div>
          <div>
            <button type="submit"
              class="w-full sm:w-auto px-6 py-2.5 rounded-xl border border-gray-300 text-sm font-bold text-gray-800 hover:bg-gray-50 transition-all">
              Update Password
            </button>
          </div>
        </form>
      </div>

      <!-- Delete Account -->
      <div class="bg-white border border-red-100 rounded-2xl p-6 sm:p-8">
        <p class="text-xs sm:text-sm font-bold text-red-500 tracking-wide mb-3">DELETE ACCOUNT</p>
        <p class="text-sm text-gray-400 leading-relaxed mb-5">
          This action will permanently delete your account and all your mood history. It cannot be undone.
        </p>
        <button onclick="confirmDeleteAccount()"
          class="w-full sm:w-auto px-6 py-2.5 rounded-xl border border-gray-300 text-sm font-bold text-gray-800 hover:bg-red-50 hover:border-red-200 hover:text-red-600 transition-all">
          Delete My Account
        </button>
      </div>

      <!-- Logout -->
      <div>
        <button onclick="logout()"
          class="w-full px-6 py-2.5 rounded-xl border border-gray-300 text-sm font-bold text-gray-800 hover:bg-yellow-50 hover:border-yellow-200 hover:text-yellow-600 transition-all">
          Log Out
        </button>
      </div>

    </div>
  </div>

  <script src="../js/navbar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/account.js"></script>
</body>
</html>
