<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — MoodTracker</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/tailwind.config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/forgot-password.js"></script>
</head>

<body class="bg-page-bg min-h-screen flex items-center justify-center p-6">

  <div class="bg-white w-full max-w-md rounded-2xl shadow-sm border border-gray-100 p-8">

    <h2 class="text-2xl font-bold text-primary mb-2">
      Reset Password
    </h2>

    <p class="text-gray-400 text-sm mb-6">
      Enter your email address and we'll send you a password reset link.
    </p>

    <form id="resetForm" class="flex flex-col gap-4">

      <input
        type="email"
        id="emailInput"
        placeholder="Enter your email"
        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-primary"
        required
      >

      <button
        type="submit"
        class="w-full py-3 rounded-xl bg-pink-bg text-primary font-bold hover:brightness-95"
      >
        SEND RESET LINK
      </button>

    </form>

    <div id="message" class="mt-4 text-sm"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/forgot-password.js"></script>

</body>
</html>
