<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoodTracker</title>
</head>
<body style="background-color: #F8F9FA; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif;">

  <div style="text-align: center;">
    <svg style="animation: spin 1s linear infinite; height: 2rem; width: 2rem; color: #1F915A; margin: 0 auto 10px auto;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle style="opacity: 0.25;" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path style="opacity: 0.75;" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    <p style="color: #1F915A; font-weight: bold; font-family: sans-serif;">Loading MoodTracker...</p>
  </div>

  <style>
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      supabaseClient.auth.onAuthStateChange((event, session) => {
        if (session) {
          window.location.replace('pages/home.html');
        } else {
          window.location.replace('pages/login.html');
        }
      });
      
      setTimeout(async () => {
        const { data } = await supabaseClient.auth.getSession();
        if (data.session) {
          window.location.replace('pages/home.html');
        } else {
          window.location.replace('pages/login.html');
        }
      }, 500); 
    });
  </script>

</body>
</html>
