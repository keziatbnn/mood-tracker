<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Statistic — MoodTracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/tailwind.config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body class="bg-page-bg font-sans overflow-x-hidden">

  <div id="navbar"></div>

  <div class="px-6 py-8 lg:px-14 lg:py-10">
    <h1 class="text-2xl sm:text-3xl font-bold text-primary mb-6">Statistic</h1>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4 mb-6">
      <div class="bg-pink-bg rounded-2xl p-5 sm:p-6 flex flex-col justify-center">
        <div class="text-2xl sm:text-3xl font-bold text-gray-700 mb-1" id="stat-total">0</div>
        <div class="text-xs sm:text-sm text-gray-400 font-medium">Entries Logged</div>
      </div>
      <div class="bg-pink-bg rounded-2xl p-5 sm:p-6 flex flex-col justify-center">
        <div id="stat-frequent" class="mb-1 h-8 sm:h-10 flex items-center"></div>
        <div class="text-xs sm:text-sm text-gray-400 font-medium">Most Frequent</div>
      </div>
      <div class="bg-pink-bg rounded-2xl p-5 sm:p-6 flex flex-col justify-center">
        <div class="text-2xl sm:text-3xl font-bold text-gray-700 mb-1" id="stat-streak">0</div>
        <div class="text-xs sm:text-sm text-gray-400 font-medium">Day Streak</div>
      </div>
      <div class="bg-pink-bg rounded-2xl p-5 sm:p-6 flex flex-col justify-center">
        <div class="text-2xl sm:text-3xl font-bold text-gray-700 mb-1" id="stat-positive">0%</div>
        <div class="text-xs sm:text-sm text-gray-400 font-medium">Positive Days</div>
      </div>
    </div>

    <div class="flex flex-col lg:flex-row gap-6 items-start w-full">

      <div class="w-full lg:flex-[3] bg-pink-bg rounded-2xl p-5 sm:p-8">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
          <div>
            <h2 class="text-lg font-bold text-primary">Mood Trend</h2>
            <p class="text-xs text-gray-400 mt-0.5">Daily mood through the month</p>
          </div>
          <div class="flex bg-white rounded-xl p-1 gap-1 w-full sm:w-auto">
            <button class="trend-btn flex-1 sm:flex-none px-4 py-1.5 rounded-lg text-xs sm:text-sm font-semibold text-gray-500 transition-all" data-view="week">Week</button>
            <button class="trend-btn flex-1 sm:flex-none px-4 py-1.5 rounded-lg text-xs sm:text-sm font-semibold bg-primary text-white transition-all" data-view="month">Month</button>
            <button class="trend-btn flex-1 sm:flex-none px-4 py-1.5 rounded-lg text-xs sm:text-sm font-semibold text-gray-500 transition-all" data-view="year">Year</button>
          </div>
        </div>
        
        <div class="h-56 sm:h-64 relative w-full">
          <canvas id="trend-chart"></canvas>
        </div>
      </div>

      <div class="w-full lg:flex-[2] bg-pink-bg rounded-2xl p-5 sm:p-8">
        <h2 class="text-lg font-bold text-primary mb-6">Mood Mix</h2>
        <div class="h-44 sm:h-52 relative w-full flex justify-center">
          <canvas id="mix-chart"></canvas>
        </div>
        <div class="flex justify-center gap-6 sm:gap-10 mt-6">
          <div id="legend-left" class="flex flex-col gap-2.5"></div>
          <div id="legend-right" class="flex flex-col gap-2.5"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/statistics.js"></script>
</body>
</html>
