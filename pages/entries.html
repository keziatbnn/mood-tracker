<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Entries — MoodTracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/tailwind.config.js"></script>
</head>
<body class="bg-page-bg font-sans">

  <div id="navbar"></div>

  <main class="px-14 py-10 min-h-[calc(100vh-64px)]">

    <!-- Section Header -->
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-primary">Mood Entries</h1>
        <p class="text-xs text-gray-400 mt-0.5" id="entries-count">0 entries total</p>
      </div>
      <button onclick="openModal()"
        class="px-5 py-2.5 rounded-full bg-pink-bg text-primary text-sm font-bold hover:bg-pink-300 transition-all hover:-translate-y-0.5">
        + Add Entry
      </button>
    </div>

    <!-- Search + Sort -->
    <div class="flex items-center gap-3 mb-5">
      <div class="flex items-center gap-2 flex-1 bg-white border border-gray-200 rounded-xl px-4 py-2.5">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" class="text-gray-400 shrink-0">
          <circle cx="7" cy="7" r="5.5" stroke="#9CA3AF" stroke-width="1.5"/>
          <path d="M11 11L14 14" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input id="search-input" type="text" placeholder="Search notes…"
          class="flex-1 text-sm text-gray-700 bg-transparent focus:outline-none placeholder-gray-300 font-[Poppins]"
          oninput="renderEntries()" />
      </div>
      <div class="flex gap-2">
        <button id="btn-newest" onclick="setSort('newest')"
          class="flex items-center gap-1.5 px-4 py-2.5 rounded-xl border-2 text-xs font-semibold transition-all sort-btn border-primary text-primary bg-pink-bg">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M4 7h6M6 10h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Newest
        </button>
        <button id="btn-oldest" onclick="setSort('oldest')"
          class="flex items-center gap-1.5 px-4 py-2.5 rounded-xl border-2 text-xs font-semibold transition-all sort-btn border-gray-200 text-gray-400 bg-white hover:border-primary hover:text-primary">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 10h10M4 7h6M6 4h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Oldest
        </button>
      </div>
    </div>

    <!-- Mood Filter -->
    <div class="flex gap-2 flex-wrap mb-6" id="mood-filters">
      <button onclick="setFilter('all')" data-filter="all"
        class="filter-chip px-4 py-1.5 rounded-full text-xs font-semibold border-2 transition-all border-primary bg-pink-bg text-primary">
        All Moods
      </button>
    </div>

    <!-- Month Label + Entry List -->
    <div id="entries-container"></div>

  </main>

  <!-- ── ADD / EDIT MODAL ── -->
  <div id="modal-overlay"
    class="fixed inset-0 bg-black/30 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md mx-4 p-7 flex flex-col gap-5">
      <h2 class="text-lg font-bold text-primary" id="modal-title">Add Entry</h2>

      <!-- Date row -->
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-2 bg-pink-bg rounded-xl px-4 py-2.5 flex-1">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" class="text-primary shrink-0">
            <rect x="2" y="3" width="12" height="11" rx="2" stroke="#1F915A" stroke-width="1.5"/>
            <path d="M5 1v3M11 1v3M2 7h12" stroke="#1F915A" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input id="modal-date" type="date"
            class="bg-transparent text-sm font-semibold text-gray-700 focus:outline-none w-full font-[Poppins]"/>
        </div>
        <button onclick="setToday()"
          class="px-4 py-2.5 rounded-xl border-2 border-primary text-primary text-xs font-bold hover:bg-pink-bg transition-all">
          Today
        </button>
      </div>

      <!-- Mood picker -->
      <div>
        <label class="text-xs font-semibold text-gray-600 block mb-3">How are you feeling?</label>
        <div class="flex gap-2 justify-between" id="modal-mood-row"></div>
      </div>

      <!-- Note -->
      <div>
        <label class="text-xs font-semibold text-gray-600 block mb-2">Note (optional)</label>
        <textarea id="modal-note" placeholder="What's on your mind?"
          class="w-full h-24 px-4 py-3 rounded-xl border border-gray-200 text-sm text-gray-700 resize-none focus:outline-none focus:border-green-400 font-[Poppins]">
        </textarea>
      </div>

      <!-- Tags -->
      <div>
        <label class="text-xs font-semibold text-gray-600 block mb-2">Tags</label>
        <div class="flex gap-2 flex-wrap" id="modal-tags">
          <span onclick="toggleTag(this)" data-tag="College"
            class="modal-tag px-4 py-1.5 rounded-full text-xs font-semibold cursor-pointer bg-[#d4f0e2] text-[#1a7a42] border-2 border-transparent hover:scale-105 transition-all">
            College
          </span>
          <span onclick="toggleTag(this)" data-tag="Work"
            class="modal-tag px-4 py-1.5 rounded-full text-xs font-semibold cursor-pointer bg-[#ffe5cc] text-[#b85e00] border-2 border-transparent hover:scale-105 transition-all">
            Work
          </span>
          <span onclick="toggleTag(this)" data-tag="Personal"
            class="modal-tag px-4 py-1.5 rounded-full text-xs font-semibold cursor-pointer bg-pink-bg text-primary border-2 border-transparent hover:scale-105 transition-all">
            Personal
          </span>
        </div>
      </div>

      <div class="flex gap-3 pt-1">
        <button onclick="closeModal()"
          class="flex-1 py-3 rounded-full border-2 border-gray-200 text-gray-500 text-sm font-bold hover:border-gray-300 transition-all">
          Cancel
        </button>
        <button onclick="saveEntry()"
          class="flex-1 py-3 rounded-full bg-pink-bg text-primary text-sm font-bold hover:bg-pink-300 transition-all hover:-translate-y-0.5">
          Save Entry
        </button>
      </div>
    </div>
  </div>

  <div id="toast"
    class="fixed bottom-8 left-1/2 -translate-x-1/2 translate-y-16 opacity-0 pointer-events-none
           bg-primary text-white px-8 py-3 rounded-full text-sm font-semibold shadow-lg
           transition-all duration-300 z-50">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/entries.js"></script>
</body>
</html>
