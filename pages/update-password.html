<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Update Password — MoodTracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/tailwind.config.js"></script>
</head>
<body class="bg-page-bg font-sans">

  <div id="navbar"></div>

  <div class="min-h-[calc(100vh-64px)] flex items-center justify-center px-6 py-12">
    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col md:flex-row">

      <!-- Left Section -->
      <div class="bg-pink-bg flex flex-col justify-between p-10 md:w-2/5">
        <div class="flex flex-col gap-6">
          <div class="w-14 h-14 bg-white rounded-xl shadow flex items-center justify-center">
            <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"/>
              <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
              <line x1="9" y1="9" x2="9.01" y2="9" stroke-linecap="round" stroke-width="2.5"/>
              <line x1="15" y1="9" x2="15.01" y2="9" stroke-linecap="round" stroke-width="2.5"/>
            </svg>
          </div>
          <div>
            <p class="text-xl font-bold text-primary font-[Poppins]">MoodTracker</p>
            <p class="text-sm text-gray-500 mt-3 leading-relaxed">
              Create a new strong password for your account. Make sure it's at least 6 characters.
            </p>
          </div>
        </div>
        <p class="text-xs text-gray-400 tracking-widest mt-10">AUTHORIZED ACCESS ONLY</p>
      </div>

      <!-- Right Section -->
      <div class="flex flex-col justify-center p-10 md:w-3/5">
        <h1 class="text-2xl font-bold text-primary font-[Poppins]">Set New Password</h1>
        <p class="text-sm text-gray-400 mt-1 mb-6">
          Enter your new password below. You'll be redirected to login after saving.
        </p>

        <div id="updateMessage" class="hidden text-sm rounded-xl px-4 py-3 mb-4"></div>

        <form id="updatePasswordForm" class="flex flex-col gap-4">

          <!-- New Password -->
          <div>
            <label class="text-xs font-semibold text-gray-500 mb-1.5 block uppercase tracking-wide">New Password</label>
            <div class="relative">
              <input type="password" id="newPassword" placeholder="At least 6 characters" autocomplete="new-password"
                class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm text-gray-800 focus:outline-none focus:border-primary font-[Poppins] pr-12" />
              <button type="button" id="toggleNewPassword"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
                <svg id="eyeIconNew" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Confirm Password -->
          <div>
            <label class="text-xs font-semibold text-gray-500 mb-1.5 block uppercase tracking-wide">Confirm New Password</label>
            <div class="relative">
              <input type="password" id="confirmPassword" placeholder="Re-enter your new password" autocomplete="new-password"
                class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm text-gray-800 focus:outline-none focus:border-primary font-[Poppins] pr-12" />
              <button type="button" id="toggleConfirmPassword"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
                <svg id="eyeIconConfirm" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Submit -->
          <button type="submit" id="saveBtn"
            class="w-full py-3 rounded-xl bg-pink-bg text-primary text-sm font-bold uppercase tracking-wide hover:brightness-95 transition-all mt-1">
            SAVE NEW PASSWORD
          </button>

        </form>

        <p class="text-sm text-gray-400 text-center mt-5">
          Remember your password?
          <a href="login.html" class="text-primary font-semibold hover:underline ml-1">Log In</a>
        </p>
      </div>

    </div>
  </div>

  <script src="../js/navbar_auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/update-password.js"></script>
</body>
</html>
